services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: agri-lend-api:latest
    container_name: agri-lend-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
