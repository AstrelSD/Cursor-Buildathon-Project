# Dev overlay: live code reload (buildathon workflow).
#
# First time (or after package.json / requirements.txt changes):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Day-to-day (edit code, save — browser updates; restart only if needed):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Production-like demo (slow rebuilds):
#   docker compose up --build

services:
  api:
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  frontend:
    build:
      dockerfile: Dockerfile.dev
    image: agri-lend-frontend:dev
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0"]
    healthcheck:
      disable: true

volumes:
  frontend_node_modules:
  frontend_next:
