# Dev overlay: live code reload (buildathon workflow).
#
# First time / after package-lock.json changes (pick one):
#   cd frontend && npm ci
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Frontend dev image does NOT run npm ci during build (network timeouts).
# On start, entrypoint runs npm ci into the node_modules volume when the lockfile changes.
#
# If Docker/npm network fails, install on the host then start without --build:
#   cd frontend && npm ci
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Day-to-day (edit code, save — browser updates; restart only if needed):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Production-like demo (slow rebuilds):
#   docker compose up --build

services:
  api:
    environment:
      GEMINI_VISION_MODEL: gemini-2.5-flash
      GEMINI_VISION_FALLBACK_MODELS: ""
      GEMINI_VISION_MAX_RETRIES: "3"
      MOCK_VISION_ON_FAILURE: "true"
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  frontend:
    build:
      dockerfile: Dockerfile.dev
    image: agri-lend-frontend:dev
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0"]
    healthcheck:
      disable: true

volumes:
  frontend_node_modules:
  frontend_next:
